<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>View Projects - AutoInspect AI</title>
    <link rel="stylesheet" href="/static/style.css?v=2.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray">
    <nav class="top-nav">
        <div class="nav-brand">
            <span class="brand-text">AutoInspect AI</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/projects" class="nav-link active">View Projects</a>
            <a href="/create_project" class="nav-btn">Create Project</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header flex-between">
            <h2>Your Inspection Projects</h2>
            <a href="/create_project" class="btn-primary small">New Project</a>
        </div>

        <div id="noProjectsMessage" class="empty-state" style="display: none;">
            <div class="empty-icon">📂</div>
            <h3>No Projects Found</h3>
            <p>You haven't created any damage inspection projects yet.</p>
            <a href="/create_project" class="btn-primary mt-3 inline-block">Create Your First Project</a>
        </div>

        <div id="projectsGrid" class="projects-grid">
            <!-- Projects injected here via JS -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const projectsGrid = document.getElementById('projectsGrid');
            const noProjectsMessage = document.getElementById('noProjectsMessage');

            // Get projects from localized storage
            let projects = JSON.parse(localStorage.getItem('autoinspect_projects')) || [];

            if (projects.length === 0) {
                noProjectsMessage.style.display = 'block';
                return;
            }

            // Sort newest first
            projects.sort((a, b) => new Date(b.dateCreated) - new Date(a.dateCreated));

            projects.forEach(project => {
                const dateRaw = new Date(project.dateCreated);
                const dateStr = dateRaw.toLocaleDateString() + ' ' + dateRaw.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                const card = document.createElement('div');
                card.className = 'project-card modern-card';
                card.innerHTML = `
                    <div class="project-header">
                        <h3 class="project-title">${project.name}</h3>
                        <span class="project-date">${dateStr}</span>
                    </div>
                    <div class="project-details">
                        <div class="detail-row">
                            <span class="detail-label">Vehicle:</span>
                            <span class="detail-value">${project.year} ${project.make} ${project.model}</span>
                        </div>
                    </div>
                    <div class="project-actions">
                        <a href="/select_input?project=${project.id}" class="btn-secondary small w-full text-center">Open Project</a>
                        <button onclick="forceDeleteProject('${project.id}')" class="btn-danger small w-full">Delete</button>
                    </div>
                `;
                projectsGrid.appendChild(card);
            });
        });

        window.forceDeleteProject = function (id) {
            console.log("Delete triggered for:", id);
            if (confirm("Are you sure you want to delete this project?")) {
                let projects = JSON.parse(localStorage.getItem('autoinspect_projects')) || [];
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('autoinspect_projects', JSON.stringify(projects));

                // If this is the active project, clear it
                if (localStorage.getItem('current_project') === id) {
                    localStorage.removeItem('current_project');
                }

                window.location.reload(true); // Hard refresh
            }
        };
    </script>
</body>

</html>
