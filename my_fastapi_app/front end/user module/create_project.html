<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Create Project - AutoInspect AI</title>
    <link rel="stylesheet" href="/static/style.css?v=3.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray">
    <nav class="top-nav">
        <div class="nav-brand">
            <span class="brand-text">AutoInspect AI</span>
        </div>
        <div class="nav-links">
            <a href="/home" class="nav-link">Home</a>
            <a href="/projects" class="nav-link">Manage Projects</a>
            <a href="/create_project" class="nav-btn active">Create Project</a>
        </div>
    </nav>

    <div class="form-container-wrapper">
        <div class="modern-card form-card">
            <h2>Create New Inspection Project</h2>
            <p class="form-subtitle">Enter the vehicle details to start a new damage detection session.</p>

            <form id="createProjectForm" class="project-form">
                <div class="form-group">
                    <label for="projectName">Project Name</label>
                    <input type="text" id="projectName" name="projectName"
                        placeholder="e.g., John Doe - Front Collision" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="carMake">Car Make</label>
                        <input type="text" id="carMake" name="carMake" placeholder="e.g., Toyota" list="makeList" autocomplete="off" required>
                        <datalist id="makeList"></datalist>
                        <span class="error-message" id="makeError" style="color: #ef4444; font-size: 0.85rem; display: none; margin-top: 0.25rem;"></span>
                    </div>

                    <div class="form-group">
                        <label for="carName">Car Model/Name</label>
                        <input type="text" id="carName" name="carName" placeholder="e.g., Camry" list="modelList" autocomplete="off" required>
                        <datalist id="modelList"></datalist>
                        <span class="error-message" id="modelError" style="color: #ef4444; font-size: 0.85rem; display: none; margin-top: 0.25rem;"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="carYear">Year Registered</label>
                        <input type="number" id="carYear" name="carYear" min="1900" max="2030" placeholder="e.g., 2022"
                            required>
                        <span class="error-message" id="yearError" style="color: #ef4444; font-size: 0.85rem; display: none; margin-top: 0.25rem;"></span>
                    </div>

                    <div class="form-group">
                        <label for="numberPlate">Number Plate</label>
                        <input type="text" id="numberPlate" name="numberPlate" placeholder="e.g., MH12AB1234" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary w-full">Create and Continue to Analysis</button>
                    <a href="/projects" class="btn-secondary w-full text-center mt-3">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/cars_database.js"></script>
    <script>
        // Populate the Make datalist
        document.addEventListener("DOMContentLoaded", () => {
            const makeList = document.getElementById('makeList');
            for (const make in carDatabase) {
                const option = document.createElement('option');
                option.value = make;
                makeList.appendChild(option);
            }
            
            // Limit year input to current year dynamically
            document.getElementById('carYear').max = new Date().getFullYear();
        });

        // When Make changes, populate Model datalist
        document.getElementById('carMake').addEventListener('input', function() {
            const selectedMake = this.value;
            const modelList = document.getElementById('modelList');
            
            // Clear previous models
            modelList.innerHTML = '';
            
            if (carDatabase[selectedMake]) {
                carDatabase[selectedMake].forEach(model => {
                    const option = document.createElement('option');
                    option.value = model;
                    modelList.appendChild(option);
                });
            }
        });

        // Helper to show/hide error
        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            if (message) {
                input.style.borderColor = '#ef4444';
                error.textContent = message;
                error.style.display = 'block';
            } else {
                input.style.borderColor = ''; // reset to default
                error.style.display = 'none';
            }
        }

        document.getElementById('createProjectForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            // Get values
            const projectName = document.getElementById('projectName').value;
            const carMake = document.getElementById('carMake').value.trim();
            const carName = document.getElementById('carName').value.trim();
            const carYear = document.getElementById('carYear').value;
            const numberPlate = document.getElementById('numberPlate').value.trim();

            let isValid = true;
            
            // Reset errors
            showError('carMake', 'makeError', '');
            showError('carName', 'modelError', '');
            showError('carYear', 'yearError', '');

            // Validate Make against database
            if (!carMake || !carDatabase[carMake]) {
                showError('carMake', 'makeError', 'Please select a valid Car Make from the list.');
                isValid = false;
            }

            // Validate Model against database
            if (carMake && carDatabase[carMake] && !carDatabase[carMake].includes(carName)) {
                showError('carName', 'modelError', 'Please select a valid Car Model from the list.');
                isValid = false;
            }

            // Validate Year
            const currentYear = new Date().getFullYear();
            if (carYear < 1900 || carYear > currentYear) {
                showError('carYear', 'yearError', `Year must be between 1900 and ${currentYear}.`);
                isValid = false;
            }

            if (!isValid) return;

            const projectData = {
                projectName: projectName,
                make: carMake,
                model: carName,
                year: carYear,
                number_plate: numberPlate
            };

            try {
                const response = await fetch('/api/projects', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(projectData)
                });

                if (response.ok) {
                    const result = await response.json();
                    localStorage.setItem('current_project', result.id);
                    window.location.href = `/select_input?project=${result.id}`;
                } else {
                    console.error("Failed to create project.");
                    alert("Failed to create project. Please try again.");
                }
            } catch (error) {
                console.error("Error creating project:", error);
                alert("Server connection error.");
            }
        });
    </script>
</body>

</html>
