<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AutoInspect AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin_static/admin.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Admin Control Panel</h1>
                <p>Sign in to manage users and projects</p>
            </div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" required placeholder="admin@123">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="12345678">
                </div>
                
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Login to Dashboard</button>
            </form>
            
            <div id="errorMsg" style="color: #ff7b72; font-size: 13px; text-align: center; margin-top: 15px; display: none;"></div>
        </div>
    </div>

    <script src="/admin_static/admin.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('admin_token', data.access_token);
                    window.location.href = '/admin/dashboard';
                } else {
                    const data = await response.json();
                    errorMsg.textContent = data.detail || 'Login failed. Invalid credentials.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again later.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
