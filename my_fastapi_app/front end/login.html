<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AutoInspect AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin_static/admin.css">
    <style>
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: #64748b; }
        .footer-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your AutoInspect AI account</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="username" required placeholder="you@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Sign In</button>
            </form>
            
            <div id="error-msg" style="color: #ff7b72; font-size: 13px; text-align: center; margin-top: 15px; display: none;"></div>

            <div class="footer-link">
                Don't have an account? <a href="/signup">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorMsg = document.getElementById('error-msg');
            
            try {
                // Determine whether user uses multipart form data, FastAPI OAuth2PasswordRequestForm expects form data
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (data.role === 'admin') {
                        localStorage.setItem('admin_token', data.access_token);
                        window.location.href = '/admin/dashboard';
                    } else {
                        localStorage.setItem('token', data.access_token);
                        window.location.href = '/user-module';
                    }
                } else {
                    errorMsg.textContent = data.detail || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server connection error';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
