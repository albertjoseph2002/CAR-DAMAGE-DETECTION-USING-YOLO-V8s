<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AutoInspect AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 400px; }
        .title { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: #64748b; text-align: center; margin-bottom: 2rem; font-size: 0.875rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; color: #334155; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1); }
        .btn-submit { width: 100%; background: #0f172a; color: white; padding: 0.75rem; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: #1e293b; }
        .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: #64748b; }
        .footer-link a { color: #38bdf8; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 class="title">Welcome Back</h1>
        <p class="subtitle">Sign in to your AutoInspect AI account</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="username" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div id="error-msg" style="color: red; font-size: 0.875rem; margin-bottom: 1rem; text-align: center; display: none;"></div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
        <div class="footer-link">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData // OAuth2PasswordRequestForm expects form data
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/user-module';
                } else {
                    errorMsg.textContent = data.detail || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server connection error';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
